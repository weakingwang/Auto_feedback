services:
  mysql:
    image: mysql:8.0
    container_name: feedback_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_RAW}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - feedback_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: feedback_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - feedback_network

  frontend:
    build: ./frontend
    container_name: feedback_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - feedback_network

volumes:
  mysql_data:

networks:
  feedback_network:
    driver: bridge
